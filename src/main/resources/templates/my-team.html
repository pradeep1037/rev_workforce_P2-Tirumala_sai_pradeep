<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Team – RevWorkforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h1>RevWorkforce</h1>
                <p>HR Management</p>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-link" th:href="@{/dashboard}"><span class="icon">🏠</span>Dashboard</a>
                <a class="nav-link" th:href="@{/profile}"><span class="icon">👤</span>My Profile</a>
                <a class="nav-link" th:href="@{/directory}"><span class="icon">📋</span>Directory</a>

                <div class="nav-label" style="margin-top:8px">Team Management</div>
                <a class="nav-link active" th:href="@{/my-team}"><span class="icon">👥</span>My Team</a>
                <a class="nav-link" th:href="@{/leaves/team}"><span class="icon">📅</span>Team Leaves</a>
                <a class="nav-link" th:href="@{/performance/team-goals}"><span class="icon">🎯</span>Team Goals</a>
                <a class="nav-link" th:href="@{/performance/team-reviews}"><span class="icon">📊</span>Team Reviews</a>

                <div class="nav-label" style="margin-top:8px">My Stuff</div>
                <a class="nav-link" th:href="@{/leaves}"><span class="icon">📅</span>My Leaves</a>
                <a class="nav-link" th:href="@{/performance/reviews}"><span class="icon">⭐</span>My Reviews</a>
                <a class="nav-link" th:href="@{/performance/goals}"><span class="icon">🎯</span>My Goals</a>
            </nav>
            <div class="sidebar-footer"><button class="btn-logout" onclick="logout()">Sign Out</button></div>
        </aside>
        <main class="main-content">
            <div class="topbar">
                <div class="d-flex align-center gap-12">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <h2>My Team Structure</h2>
                </div>
            </div>
            <div class="page-content">
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
                    <div th:if="${#lists.isEmpty(team)}"
                        style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:48px 0">
                        No team members report directly to you.
                    </div>
                    <div th:each="emp : ${team}" class="card"
                        style="padding:20px;display:flex;flex-direction:column;gap:12px">
                        <div style="display:flex;align-items:center;gap:12px">
                            <div style="width:48px;height:48px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;flex-shrink:0"
                                th:text="${#strings.substring(emp.name,0,1)}">A</div>
                            <div>
                                <div class="fw-600" style="font-size:1.05rem;" th:text="${emp.name}">Name</div>
                                <div class="fs-xs text-muted" th:text="${emp.email}">email</div>
                            </div>
                        </div>
                        <div
                            style="border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:8px">
                            <div class="d-flex justify-between">
                                <span class="fs-xs text-muted">Role</span>
                                <span class="badge badge-employee" th:text="${emp.role}">-</span>
                            </div>
                            <div class="d-flex justify-between">
                                <span class="fs-xs text-muted">Department</span>
                                <span class="fs-sm" th:text="${emp.departmentName ?: '-'}">-</span>
                            </div>
                            <div class="d-flex justify-between">
                                <span class="fs-xs text-muted">Designation</span>
                                <span class="fs-sm" th:text="${emp.designationName ?: '-'}">-</span>
                            </div>
                            <div class="d-flex justify-between">
                                <span class="fs-xs text-muted">Phone</span>
                                <span class="fs-sm" th:text="${emp.phone ?: '-'}">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        function logout() { document.cookie = 'JWT_TOKEN=;expires=Thu,01 Jan 1970'; window.location.href = '/login'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    </script>
</body>

</html>
