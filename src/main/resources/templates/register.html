<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register – RevWorkforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>RevWorkforce</h1>
      <p>Create your account</p>
    </div>

    <div class="login-form">
      <h2>Sign up</h2>

      <div id="registerError" class="alert alert-danger" style="display:none"></div>
      <div id="registerSuccess" class="alert alert-success" style="display:none"></div>

      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input id="name" type="text" class="form-control" placeholder="Enter your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" class="form-control" placeholder="you@revworkforce.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" class="form-control" placeholder="Repeat password" autocomplete="new-password">
      </div>

      <button id="registerBtn" class="btn btn-primary w-100" style="justify-content:center;margin-top:8px;" onclick="doRegister()">
        Create Account
      </button>

      <div style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted)">
        Already have an account?
        <a href="/login" style="color:var(--primary);text-decoration:none;font-weight:600;">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  async function doRegister() {
    const btn = document.getElementById('registerBtn');
    const errBox = document.getElementById('registerError');
    const sucBox = document.getElementById('registerSuccess');

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    errBox.style.display = 'none';
    sucBox.style.display = 'none';

    // Client-side validation
    if (!name || !email || !password || !confirmPassword) {
      showError('Please fill in all fields.'); return;
    }
    if (name.length < 2) { showError('Name must be at least 2 characters.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

    btn.textContent = 'Creating account…';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.message || 'Registration failed');
      }

      sucBox.textContent = 'Account created successfully! Redirecting to login…';
      sucBox.style.display = 'block';
      setTimeout(() => { window.location.href = '/login'; }, 1800);
    } catch (e) {
      showError(e.message);
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('registerError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });
</script>
</body>
</html>
