<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Employee Management – RevWorkforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h1>RevWorkforce</h1>
                <p>Admin Panel</p>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-link" th:href="@{/dashboard}"><span class="icon">🏠</span>Dashboard</a>
                <div class="nav-label" style="margin-top:8px">Administration</div>
                <a class="nav-link active" th:href="@{/admin/employees}"><span class="icon">🏢</span>Employees</a>
                <a class="nav-link" th:href="@{/admin/departments}"><span class="icon">⚙️</span>Departments</a>
                <a class="nav-link" th:href="@{/admin/leaves}"><span class="icon">📑</span>All Leaves</a>
                <a class="nav-link" th:href="@{/admin/announcements}"><span class="icon">📢</span>Announcements</a>
                <a class="nav-link" th:href="@{/admin/audit-logs}"><span class="icon">🔍</span>Audit Logs</a>
            </nav>
            <div class="sidebar-footer"><button class="btn-logout" onclick="logout()">Sign Out</button></div>
        </aside>
        <main class="main-content">
            <div class="topbar">
                <div class="d-flex align-center gap-12">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <h2>Employee Management</h2>
                </div>
                <button class="btn btn-primary btn-sm"
                    onclick="document.getElementById('addEmpModal').classList.add('open')">➕ Add Employee</button>
            </div>
            <div class="page-content">
                <!-- SEARCH -->
                <form th:action="@{/admin/employees}" method="get" class="search-bar">
                    <input type="text" name="search" class="form-control"
                        placeholder="Search by name, email, department…">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a th:href="@{/admin/employees}" class="btn btn-ghost">Reset</a>
                </form>

                <div class="card">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Department</th>
                                    <th>Designation</th>
                                    <th>Role</th>
                                    <th>Manager</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(employees)}">
                                    <td colspan="8" style="text-align:center;color:var(--text-muted);padding:32px">No
                                        employees found.</td>
                                </tr>
                                <tr th:each="emp : ${employees}">
                                    <td>
                                        <div class="fw-600" th:text="${emp.name}">-</div>
                                        <div class="fs-xs text-muted" th:text="${emp.phone ?: ''}"></div>
                                    </td>
                                    <td th:text="${emp.email}">-</td>
                                    <td th:text="${emp.departmentName ?: '-'}">-</td>
                                    <td th:text="${emp.designationName ?: '-'}">-</td>
                                    <td><span class="badge"
                                            th:classappend="${emp.role == 'ADMIN'?'badge-admin':(emp.role=='MANAGER'?'badge-manager':'badge-employee')}"
                                            th:text="${emp.role}">-</span></td>
                                    <td th:text="${emp.managerName ?: '-'}">-</td>
                                    <td><span class="badge"
                                            th:classappend="${emp.status=='ACTIVE'?'badge-active':'badge-inactive'}"
                                            th:text="${emp.status}">-</span></td>
                                    <td>
                                        <div style="display:flex;gap:4px">
                                            <button th:if="${emp.status=='ACTIVE'}" class="btn btn-danger btn-xs"
                                                th:onclick="'deactivate('+${emp.employeeId}+')'">Deactivate</button>
                                            <button th:if="${emp.status=='INACTIVE'}" class="btn btn-success btn-xs"
                                                th:onclick="'reactivate('+${emp.employeeId}+')'">Reactivate</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal-overlay" id="addEmpModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Add New Employee</div><button class="modal-close"
                    onclick="document.getElementById('addEmpModal').classList.remove('open')">✕</button>
            </div>
            <div id="addEmpAlert" class="alert" style="display:none"></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Full Name *</label><input id="empName" type="text"
                        class="form-control"></div>
                <div class="form-group"><label class="form-label">Email *</label><input id="empEmail" type="email"
                        class="form-control"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Password *</label><input id="empPassword"
                        type="password" class="form-control"></div>
                <div class="form-group"><label class="form-label">Role *</label>
                    <select id="empRole" class="form-control">
                        <option value="EMPLOYEE">Employee</option>
                        <option value="MANAGER">Manager</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Department</label>
                    <select id="empDept" class="form-control">
                        <option value="">-- Select --</option>
                        <option th:each="d : ${departments}" th:value="${d.deptId}" th:text="${d.deptName}">Dept
                        </option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Designation</label>
                    <select id="empDesig" class="form-control">
                        <option value="">-- Select --</option>
                        <option th:each="d : ${designations}" th:value="${d.desigId}" th:text="${d.desigName}">Desig
                        </option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Manager</label>
                    <select id="empManager" class="form-control">
                        <option value="">-- None --</option>
                        <option th:each="m : ${managers}" th:value="${m.employeeId}" th:text="${m.name}">Manager
                        </option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label">Joining Date</label><input id="empJoinDate"
                        type="date" class="form-control"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Phone</label><input id="empPhone" type="tel"
                        class="form-control"></div>
                <div class="form-group"><label class="form-label">Salary</label><input id="empSalary" type="number"
                        class="form-control"></div>
            </div>
            <div style="display:flex;gap:12px;margin-top:8px">
                <button class="btn btn-primary" onclick="addEmployee()">Create Employee</button>
                <button class="btn btn-ghost"
                    onclick="document.getElementById('addEmpModal').classList.remove('open')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        async function addEmployee() {
            const body = {
                name: document.getElementById('empName').value,
                email: document.getElementById('empEmail').value,
                password: document.getElementById('empPassword').value,
                role: document.getElementById('empRole').value,
                departmentId: document.getElementById('empDept').value || null,
                designationId: document.getElementById('empDesig').value || null,
                managerId: document.getElementById('empManager').value || null,
                joiningDate: document.getElementById('empJoinDate').value || null,
                phone: document.getElementById('empPhone').value,
                salary: parseFloat(document.getElementById('empSalary').value) || null
            };
            const res = await fetch('/api/admin/employees', { method: 'POST', headers: { 'Content-Type': 'application/json', ...getAuthHeaders() }, body: JSON.stringify(body) });
            if (res.ok) { location.reload(); }
            else { const d = await res.json(); const el = document.getElementById('addEmpAlert'); el.className = 'alert alert-danger'; el.textContent = d.message || 'Error'; el.style.display = 'block'; }
        }
        async function deactivate(id) {
            if (!confirm('Deactivate this employee?')) return;
            const res = await fetch(`/api/admin/employees/${id}/deactivate`, { method: 'PUT', headers: getAuthHeaders() });
            if (res.ok) { location.reload(); }
        }
        async function reactivate(id) {
            if (!confirm('Reactivate this employee?')) return;
            const res = await fetch(`/api/admin/employees/${id}/reactivate`, { method: 'PUT', headers: getAuthHeaders() });
            if (res.ok) { location.reload(); }
        }
        function getAuthHeaders() { const t = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('JWT_TOKEN='))?.split('=')[1]; return t ? { 'Authorization': 'Bearer ' + t } : {}; }
        function logout() { document.cookie = 'JWT_TOKEN=;expires=Thu,01 Jan 1970'; window.location.href = '/login'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    </script>
</body>

</html>
