<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password – RevWorkforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-dark text-light">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card bg-surface border-secondary shadow-lg p-5"
      style="max-width: 500px; width: 100%; border-radius: 20px;">
      <div class="text-center mb-4">
        <h1 class="fw-bolder bg-gradient-text">RevWorkforce</h1>
        <p class="text-muted small mt-1">Password Reset</p>
      </div>

      <div>
        <div id="alertBox" class="alert p-3 rounded" style="display:none"></div>

        <div id="step1">
            <h2 class="h5 fw-semibold mb-4 text-center">Enter your email</h2>
            <div class="mb-3">
              <label class="form-label text-muted small fw-medium" for="email">Email Address</label>
              <input id="email" type="email" class="form-control bg-surface2 border-secondary text-light"
                placeholder="you@revworkforce.com" autocomplete="email">
            </div>
            <button id="getQuestionBtn" class="btn btn-primary w-100 py-2 fw-medium" onclick="getSecurityQuestion()">
              Get Security Question
            </button>
        </div>

        <div id="step2" style="display:none">
            <h2 class="h5 fw-semibold mb-4 text-center">Reset your password</h2>
            <div class="mb-3">
              <label class="form-label text-muted small fw-medium">Security Question</label>
              <div id="securityQuestionText" class="form-control-plaintext text-light fw-bold bg-surface2 rounded px-3 py-2 border border-secondary mb-2"></div>
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-medium" for="answer">Answer</label>
              <input id="answer" type="text" class="form-control bg-surface2 border-secondary text-light"
                placeholder="Enter your answer">
            </div>
            <div class="mb-3">
              <label class="form-label text-muted small fw-medium" for="newPassword">New Password</label>
              <input id="newPassword" type="password" class="form-control bg-surface2 border-secondary text-light"
                placeholder="••••••••">
            </div>
            <div class="mb-4">
              <label class="form-label text-muted small fw-medium" for="confirmPassword">Confirm Password</label>
              <input id="confirmPassword" type="password" class="form-control bg-surface2 border-secondary text-light"
                placeholder="••••••••">
            </div>
            <button id="resetBtn" class="btn btn-success w-100 py-2 fw-medium" onclick="resetPassword()">
              Reset Password
            </button>
        </div>

        <div class="text-center mt-4 small text-muted">
          Remembered your password? <a th:href="@{/login}"
            class="text-primary text-decoration-none fw-semibold">Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function getSecurityQuestion() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('getQuestionBtn');
      
      hideAlert();
      if (!email) { showAlert('Please enter your email.', 'danger'); return; }

      btn.textContent = 'Fetching...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/security-question?email=' + encodeURIComponent(email));
        
        if (!res.ok) {
          let errText = 'Failed to fetch question';
          try {
             const data = await res.json();
             errText = data.message || errText;
          } catch(e) {
             errText = await res.text() || errText;
          }
          let parsedError = errText;
          try { parsedError = JSON.parse(errText).message || errText; } catch(e){}
          throw new Error(parsedError);
        }

        const question = await res.text();
        document.getElementById('securityQuestionText').textContent = question;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      } catch (e) {
        showAlert(e.message, 'danger');
        btn.textContent = 'Get Security Question';
        btn.disabled = false;
      }
    }

    async function resetPassword() {
      const email = document.getElementById('email').value.trim();
      const answer = document.getElementById('answer').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('resetBtn');

      hideAlert();
      if (!answer) { showAlert('Please enter your answer.', 'danger'); return; }
      if (!newPassword) { showAlert('Please enter a new password.', 'danger'); return; }
      if (newPassword !== confirmPassword) { showAlert('Passwords do not match.', 'danger'); return; }

      btn.textContent = 'Resetting...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, answer, newPassword })
        });

        if (!res.ok) {
          let errText = 'Failed to reset password';
          try {
             const data = await res.json();
             errText = data.message || errText;
          } catch(e) {
             errText = await res.text() || errText;
          }
          let parsedError = errText;
          try { parsedError = JSON.parse(errText).message || errText; } catch(e){}
          throw new Error(parsedError);
        }
        
        const successMsg = await res.text();
        showAlert(successMsg, 'success');
        document.getElementById('step2').style.display = 'none';
      } catch (e) {
        showAlert(e.message, 'danger');
        btn.textContent = 'Reset Password';
        btn.disabled = false;
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className = 'alert p-3 rounded alert-' + type;
      el.style.display = 'block';
    }

    function hideAlert() {
      const el = document.getElementById('alertBox');
      el.style.display = 'none';
    }
  </script>
</body>

</html>
