<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login – RevWorkforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-dark text-light">
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card bg-surface border-secondary shadow-lg p-5"
      style="max-width: 450px; width: 100%; border-radius: 20px;">
      <div class="text-center mb-4">
        <h1 class="fw-bolder bg-gradient-text">RevWorkforce</h1>
        <p class="text-muted small mt-1">Human Resource Management System</p>
      </div>

      <div>
        <h2 class="h5 fw-semibold mb-4">Sign in to your account</h2>

        <div th:if="${error}" class="alert alert-danger p-3 rounded" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success p-3 rounded" th:text="${success}"></div>

        <div id="loginError" class="alert alert-danger p-3 rounded" style="display:none"></div>

        <div class="mb-3">
          <label class="form-label text-muted small fw-medium" for="email">Email Address</label>
          <input id="email" type="email" class="form-control bg-surface2 border-secondary text-light"
            placeholder="you@revworkforce.com" autocomplete="email">
        </div>
        <div class="mb-4">
          <label class="form-label text-muted small fw-medium" for="password">Password</label>
          <input id="password" type="password" class="form-control bg-surface2 border-secondary text-light"
            placeholder="••••••••" autocomplete="current-password">
        </div>

        <button id="loginBtn" class="btn btn-primary w-100 py-2 fw-medium" onclick="doLogin()">
          Sign In
        </button>

        <div class="text-center mt-4 small text-muted">
          <a th:href="@{/forgot-password}" class="text-primary text-decoration-none fw-semibold">Forgot Password?</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const errBox = document.getElementById('loginError');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errBox.style.display = 'none';
      if (!email || !password) { showError('Please enter email and password.'); return; }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || 'Invalid credentials');
        }

        await res.json(); // JWT_TOKEN cookie is set by server (HttpOnly)
        window.location.href = '/dashboard';
      } catch (e) {
        showError(e.message);
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>

</html>
