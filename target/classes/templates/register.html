<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register – RevWorkforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="bg-dark text-light">
  <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="card bg-surface border-secondary shadow-lg p-5"
      style="max-width: 450px; width: 100%; border-radius: 20px;">
      <div class="text-center mb-4">
        <h1 class="fw-bolder bg-gradient-text">RevWorkforce</h1>
        <p class="text-muted small mt-1">Create your account</p>
      </div>

      <div>
        <h2 class="h5 fw-semibold mb-4">Sign up</h2>

        <div id="registerError" class="alert alert-danger p-3 rounded" style="display:none"></div>
        <div id="registerSuccess" class="alert alert-success p-3 rounded" style="display:none"></div>

        <div class="mb-3">
          <label class="form-label text-muted small fw-medium" for="name">Full Name</label>
          <input id="name" type="text" class="form-control bg-surface2 border-secondary text-light"
            placeholder="Enter your name" autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label text-muted small fw-medium" for="email">Email Address</label>
          <input id="email" type="email" class="form-control bg-surface2 border-secondary text-light"
            placeholder="you@revworkforce.com" autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label text-muted small fw-medium" for="password">Password</label>
          <input id="password" type="password" class="form-control bg-surface2 border-secondary text-light"
            placeholder="Min 8 characters" autocomplete="new-password">
        </div>
        <div class="mb-4">
          <label class="form-label text-muted small fw-medium" for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" class="form-control bg-surface2 border-secondary text-light"
            placeholder="Repeat password" autocomplete="new-password">
        </div>

        <button id="registerBtn" class="btn btn-primary w-100 py-2 fw-medium" onclick="doRegister()">
          Create Account
        </button>

        <div class="text-center mt-4 small text-muted">
          Already have an account?
          <a href="/login" class="text-primary text-decoration-none fw-semibold">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function doRegister() {
      const btn = document.getElementById('registerBtn');
      const errBox = document.getElementById('registerError');
      const sucBox = document.getElementById('registerSuccess');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      errBox.style.display = 'none';
      sucBox.style.display = 'none';

      // Client-side validation
      if (!name || !email || !password || !confirmPassword) {
        showError('Please fill in all fields.'); return;
      }
      if (name.length < 2) { showError('Name must be at least 2 characters.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email address.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || 'Registration failed');
        }

        sucBox.textContent = 'Account created successfully! Redirecting to login…';
        sucBox.style.display = 'block';
        setTimeout(() => { window.location.href = '/login'; }, 1800);
      } catch (e) {
        showError(e.message);
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('registerError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doRegister();
    });
  </script>
</body>

</html>
