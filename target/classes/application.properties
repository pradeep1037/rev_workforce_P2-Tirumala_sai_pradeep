# ===============================
# APPLICATION CONFIGURATION
# ===============================
spring.application.name=RevWorkforce
server.port=8082


# ===============================
# ORACLE DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=hrm
spring.datasource.password=hrm123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Prevents lazy loading serialization issues
spring.jpa.open-in-view=true


# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML


# ===============================
# JWT CONFIGURATION
# ===============================
# Secret must be at least 256 bits
app.jwt.secret=RevWorkforce_Super_Secret_Key_2024_Must_Be_At_Least_256_Bits_Long

# 24 hours
app.jwt.expiration-ms=86400000


# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.com.rev.app=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# ===============================
# JACKSON CONFIGURATION
# ===============================
spring.jackson.serialization.fail-on-empty-beans= false